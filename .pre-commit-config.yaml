repos:
  # ---------------------------------------------------------------------------
  # General file hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key

  # ---------------------------------------------------------------------------
  # Python — ruff (lint + format)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # ---------------------------------------------------------------------------
  # Frontend — ESLint + TypeScript
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        language: node
        entry: bash -c 'cd frontend && npx eslint --max-warnings 0 "${@#frontend/}"' --
        types_or: [javascript, jsx, ts, tsx]
        files: ^frontend/src/
        pass_filenames: true
        additional_dependencies: []

      - id: tsc
        name: TypeScript type-check
        language: node
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        pass_filenames: false
        files: ^frontend/src/
        types_or: [javascript, jsx, ts, tsx]
        additional_dependencies: []

      - id: npm-audit
        name: npm audit (high+)
        language: system
        entry: bash -c 'cd frontend && npm audit --audit-level=high'
        pass_filenames: false
        files: ^frontend/

  # ---------------------------------------------------------------------------
  # Python — uv audit (dependency vulnerability scan)
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: uv-audit
        name: uv audit
        language: system
        entry: bash -c 'cd backend && uv audit'
        pass_filenames: false
        files: ^backend/

  # ---------------------------------------------------------------------------
  # Python — bandit SAST
  # ---------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4  # 1.9.x required for Python 3.14 (ast.Num removed in 3.14)
    hooks:
      - id: bandit
        args: ["-c", "backend/pyproject.toml", "-l"]
        files: ^backend/

  # ---------------------------------------------------------------------------
  # Secret scanning — gitleaks (mirrored server-side in CI: secret-scan job)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
