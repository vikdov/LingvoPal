services:
  - type: web
    name: lingvopal-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install uv && uv sync --frozen --no-cache
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: DEBUG
        value: false
      - key: DATABASE_SSL
        value: true
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: DATABASE_HOST
        sync: false
      - key: DATABASE_NAME
        sync: false
      - key: DATABASE_PORT
        value: "5432"
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_SSL
        value: true
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: AI_PROVIDER
        value: groq
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        value: llama-3.3-70b-versatile
      - key: TTS_ENABLED
        value: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_TLS
        value: true
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: IMAGE_SEARCH_PROVIDER
        value: unsplash
      - key: IMAGE_SEARCH_API_KEY
        sync: false
      - key: S3_USE_TLS
        value: true
      - key: S3_HOST
        sync: false
      - key: S3_PORT
        value: "443"
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: MEDIA_BASE_URL
        sync: false
