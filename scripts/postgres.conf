# scripts/postgres.conf
# PostgreSQL configuration optimized for local development

# ============================================================================
# Connection Settings
# ============================================================================
listen_addresses = '*'
max_connections = 200
superuser_reserved_connections = 10

# ============================================================================
# Memory Settings (suitable for modern dev machines)
# ============================================================================
shared_buffers = 256MB
effective_cache_size = 1GB
maintenance_work_mem = 64MB
work_mem = 16MB

# ============================================================================
# Logging (helpful for development and debugging)
# ============================================================================
log_statement = 'none'                  # 'none' or 'ddl' – 'all' creates too much noise
log_duration = on
log_min_duration_statement = 250        # Log queries slower than 250ms
log_connections = on
log_disconnections = on
log_line_prefix = '%t [%p]: '
log_lock_waits = on

# ============================================================================
# Performance tuning for development
# ============================================================================
random_page_cost = 1.1
effective_io_concurrency = 200

# Faster writes during heavy local development
# WARNING: Do NOT use this setting in production!
synchronous_commit = off

# ============================================================================
# Timezone & Locale
# ============================================================================
timezone = 'UTC'

# ============================================================================
# Other useful dev settings
# ============================================================================
# Allow more parallel workers (good for complex queries)
max_parallel_workers_per_gather = 4
max_parallel_workers = 8

# Enable JIT compilation (usually helps in modern Postgres)
jit = on
