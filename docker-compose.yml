# LingvoPal/docker-compose.yml
# Docker Compose configuration for LingvoPal development environment
# 
# Services:
# - PostgreSQL 16: Main application database
# - pgAdmin: Database administration UI (optional)
# - Redis: In-memory data store (optional, for future use)


services:
  postgres:
    image: postgres:16-alpine
    container_name: lingvopal_postgres
    restart: unless-stopped
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]

    # Read credentials from root .env (single source of truth)
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"

    ports:
      - "${DATABASE_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres.conf:/etc/postgresql/postgresql.conf:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - lingvopal_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lingvopal_pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"

    ports:
      - "${PGADMIN_PORT}:80"

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - lingvopal_network

  redis:
    image: redis:8-alpine                    # Updated to current stable (2026)
    container_name: lingvopal_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    command: redis-server 
      --save 60 1 
      --loglevel warning 
      --maxmemory 512mb 
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - lingvopal_network

  redisinsight:
    image: redis/redisinsight:latest
    container_name: lingvopal_redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    networks:
      - lingvopal_network

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lingvopal_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app                  # Hot reload for development
      - /app/.venv
      - ./docker-compose.yml:/docker-compose.yml:ro
      - ./.env:/.env:ro
      - ./scripts:/app/scripts
    environment:
      # Override the host-based DATABASE_HOST from .env so the container
      # connects via the Docker network instead of localhost.
      DATABASE_HOST: lingvopal_postgres
      REDIS_HOST: lingvopal_redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lingvopal_network
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
networks:
  lingvopal_network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
