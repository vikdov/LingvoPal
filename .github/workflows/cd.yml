name: CD

# ---------------------------------------------------------------------------
# Continuous Deployment — free-tier multi-PaaS, CI-driven.
#
# One pipeline owns the whole commit -> live path so the ordering is guaranteed
# and the lead time is measurable end to end:
#
#     migrate (Neon)  ->  deploy backend (Render) + deploy frontend (Vercel)
#                     ->  smoke (poll /health, record live time)
#
# The migration runs FIRST and the deploys are gated on it, so a failed
# migration blocks the entire release rather than letting new application code
# boot against an unmigrated schema.
#
# PRE-FLIGHT (must be done once, outside this file):
#   * Render: set Auto-Deploy = OFF. This workflow triggers the build via the
#     deploy hook AFTER the migration. If Render also auto-deploys on git push,
#     the deploy races the migration and the ordering guarantee is lost.
#   * Vercel: disable Git auto-deploy for the production branch for the same
#     reason; this workflow triggers it via a deploy hook.
#   * Backend DB engine: the app builds its connection URL from DATABASE_*
#     components and does not append TLS. Neon enforces TLS. The migration job
#     below covers this with PGSSLMODE=require (libpq/psycopg2); the running
#     backend uses asyncpg and reads ssl from connect_args (see config /
#     database engine setup).
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

# Never run two releases of the same ref at once; never cancel a release midway.
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # 1. Migrate the managed database (Neon) before anything is deployed.
  # -------------------------------------------------------------------------
  migrate:
    name: Migrate · Neon (alembic upgrade head)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # The app assembles its own URL from these components (Neon pooled
      # endpoint). Store the pooled host, not the direct one, for CI.
      DATABASE_USER: ${{ secrets.DATABASE_USER }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
      DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
      DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
      # Neon requires TLS; the built URL carries no sslmode, so let libpq read
      # it from the environment for the sync (psycopg2) migration path. Channel
      # binding matches Neon's connection snippet. These are libpq variables and
      # affect only the migration path — the asyncpg runtime uses DATABASE_SSL.
      PGSSLMODE: require
      PGCHANNELBINDING: require
      # Settings() validates every required field at import, and alembic/env.py
      # imports the app — so these must be present or the migration crashes
      # before touching the DB. But the migration connects to Neon ONLY; it never
      # calls these services. They are therefore import-time placeholders, NOT
      # secrets. The real values live in the Render runtime env. ENV is not set
      # to production here, so the entropy/TLS production validators do not run.
      SECRET_KEY: ci-migration-secret-key-minimum-32-chars-xyz
      S3_ACCESS_KEY: migrate-noop
      S3_SECRET_KEY: migrate-noop
      AI_API_KEY: migrate-noop
      IMAGE_SEARCH_API_KEY: migrate-noop
      TTS_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --no-cache

      - name: Apply migrations to Neon
        run: uv run alembic upgrade head

  # -------------------------------------------------------------------------
  # 2. Deploy backend (Render) — only after a successful migration.
  # -------------------------------------------------------------------------
  deploy-backend:
    name: Deploy · Render (backend)
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" > /dev/null
          echo "Render backend deploy triggered for ${GITHUB_SHA::7}."

  # -------------------------------------------------------------------------
  # 3. Smoke backend: poll /health until the endpoint reports THIS commit.
  #
  #    This is the true release gate. It does two things at once:
  #      * waits for the async Render build to finish and the new revision to
  #        boot (the deploy hook only TRIGGERS the build; it returns instantly);
  #      * verifies the live revision is the new commit, not the previous one
  #        still answering during the rolling deploy — by matching the `commit`
  #        field (RENDER_GIT_COMMIT) against GITHUB_SHA.
  #
  #    The frontend deploy is gated on this job, so the frontend never ships
  #    against a backend that failed to migrate, build, or boot.
  #
  #    MEASUREMENT (§4.9): `elapsed` here is the hook -> healthy window inside
  #    the job. It is NOT the full push -> live lead time, because the Render
  #    build queue runs outside the workflow. For the lead-time metric, measure
  #    push timestamp -> first matching /health externally, and report cold
  #    (first build) vs warm (redeploy) separately — Render free tier also
  #    cold-starts after idle, which inflates the first hit.
  # -------------------------------------------------------------------------
  smoke-backend:
    name: Smoke · backend health (new commit live)
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - name: Poll backend /health until it reports this commit
        run: |
          start=$(date +%s)
          url="${{ secrets.BACKEND_PUBLIC_URL }}/health"
          echo "Polling $url until commit == ${GITHUB_SHA}"
          for i in $(seq 1 90); do        # up to ~15 min, covers a cold build
            body=$(curl -s --max-time 10 "$url" || true)
            live=$(printf '%s' "$body" | jq -r '.commit // empty' 2>/dev/null || true)
            if [ "$live" = "${GITHUB_SHA}" ]; then
              elapsed=$(( $(date +%s) - start ))
              echo "LIVE: new revision ${GITHUB_SHA::7} healthy after ${elapsed}s (smoke window; excludes build queue)"
              exit 0
            fi
            echo "  attempt $i: live commit='${live:-none}' — waiting 10s"
            sleep 10
          done
          echo "::error::backend did not report commit ${GITHUB_SHA::7} within the smoke window"
          exit 1

  # -------------------------------------------------------------------------
  # 4. Deploy frontend (Vercel) — only after the backend is migrated, built,
  #    booted, and confirmed healthy on the new commit. This is the strong
  #    ordering: a static frontend never reaches users ahead of a working API.
  # -------------------------------------------------------------------------
  deploy-frontend:
    name: Deploy · Vercel (frontend)
    needs: smoke-backend
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        run: |
          curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" > /dev/null
          echo "Vercel frontend deploy triggered for ${GITHUB_SHA::7}."

  # -------------------------------------------------------------------------
  # 5. Smoke frontend: confirm the Vercel deployment serves 200. Closes the
  #    release: backend healthy on new commit, frontend reachable.
  # -------------------------------------------------------------------------
  smoke-frontend:
    name: Smoke · frontend reachable
    needs: deploy-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Poll frontend until live
        run: |
          start=$(date +%s)
          url="${{ secrets.FRONTEND_PUBLIC_URL }}"
          echo "Polling $url"
          for i in $(seq 1 60); do        # up to ~10 min, covers a cold build
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$url" || true)
            if [ "$code" = "200" ]; then
              elapsed=$(( $(date +%s) - start ))
              echo "Frontend LIVE after ${elapsed}s (smoke window; excludes build queue)"
              exit 0
            fi
            echo "  attempt $i: HTTP ${code:-000} — waiting 10s"
            sleep 10
          done
          echo "::error::frontend did not become reachable within the smoke window"
          exit 1
