name: CD

on:
  push:
    branches: [main]

# One deploy at a time — never cancel in-progress deploys
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # --------------------------------------------------------------------------
  # Gate: all CI checks must pass before deploy
  # --------------------------------------------------------------------------
  ci-gate:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  # --------------------------------------------------------------------------
  # Deploy backend to Render
  #
  # Required GitHub secret:
  #   RENDER_DEPLOY_HOOK_URL  — Render dashboard → service → Settings → Deploy Hook
  # --------------------------------------------------------------------------
  deploy-backend:
    name: Deploy backend → Render
    runs-on: ubuntu-latest
    needs: ci-gate
    environment: production

    steps:
      - name: Trigger Render deploy
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Accept: application/json"

      - name: Wait for deploy to start
        run: sleep 10

  # --------------------------------------------------------------------------
  # Run DB migrations after Render deploy starts
  #
  # Required GitHub secrets:
  #   NEON_DATABASE_URL  — full asyncpg URL from Neon dashboard
  # --------------------------------------------------------------------------
  migrate:
    name: Run migrations
    runs-on: ubuntu-latest
    needs: deploy-backend
    defaults:
      run:
        working-directory: backend

    env:
      ENV: production
      DATABASE_SSL_REQUIRE: "true"
      DATABASE_USER: ${{ secrets.PROD_DATABASE_USER }}
      DATABASE_PASSWORD: ${{ secrets.PROD_DATABASE_PASSWORD }}
      DATABASE_HOST: ${{ secrets.PROD_DATABASE_HOST }}
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${{ secrets.PROD_DATABASE_NAME }}
      REDIS_HOST: ${{ secrets.PROD_REDIS_HOST }}
      REDIS_PORT: ${{ secrets.PROD_REDIS_PORT }}
      REDIS_PASSWORD: ${{ secrets.PROD_REDIS_PASSWORD }}
      SECRET_KEY: ${{ secrets.PROD_SECRET_KEY }}
      S3_ACCESS_KEY: ${{ secrets.PROD_S3_ACCESS_KEY }}
      S3_SECRET_KEY: ${{ secrets.PROD_S3_SECRET_KEY }}
      S3_USE_TLS: "true"
      S3_HOST: ${{ secrets.PROD_S3_HOST }}
      S3_PORT: ${{ secrets.PROD_S3_PORT }}
      S3_BUCKET: ${{ secrets.PROD_S3_BUCKET }}
      MEDIA_BASE_URL: ${{ secrets.PROD_MEDIA_BASE_URL }}
      AI_API_KEY: ${{ secrets.PROD_AI_API_KEY }}
      IMAGE_SEARCH_API_KEY: ${{ secrets.PROD_IMAGE_SEARCH_API_KEY }}
      TTS_ENABLED: "false"
      CORS_ORIGINS: ${{ secrets.PROD_CORS_ORIGINS }}
      FRONTEND_URL: ${{ secrets.PROD_FRONTEND_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --no-cache

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Seed official sets
        run: uv run python scripts/seed_official.py

  # --------------------------------------------------------------------------
  # Create GitHub release on semver tags
  # --------------------------------------------------------------------------
  release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: ci-gate
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
