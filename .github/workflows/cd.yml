name: CD

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

# Only one CD run at a time per ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/lingvopal-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/lingvopal-frontend

jobs:
  # --------------------------------------------------------------------------
  # Determine image tag from ref
  # --------------------------------------------------------------------------
  meta:
    name: Resolve image tags
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tags_backend: ${{ steps.meta-backend.outputs.tags }}
      tags_frontend: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Resolve version label
        id: meta
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

  # --------------------------------------------------------------------------
  # Build + push backend image
  # --------------------------------------------------------------------------
  build-backend:
    name: Build & push backend
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ${{ needs.meta.outputs.tags_backend }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

  # --------------------------------------------------------------------------
  # Build + push frontend image
  # --------------------------------------------------------------------------
  build-frontend:
    name: Build & push frontend
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: ${{ needs.meta.outputs.tags_frontend }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

  # --------------------------------------------------------------------------
  # Deploy to Railway (backend + frontend services)
  #
  # Required GitHub secrets:
  #   RAILWAY_TOKEN               — from Railway dashboard → Account Settings → Tokens
  #   RAILWAY_BACKEND_SERVICE_ID  — Railway service ID for backend
  #   RAILWAY_FRONTEND_SERVICE_ID — Railway service ID for frontend
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment: production
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend
        run: railway redeploy --service ${{ secrets.RAILWAY_BACKEND_SERVICE_ID }} --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy frontend
        run: railway redeploy --service ${{ secrets.RAILWAY_FRONTEND_SERVICE_ID }} --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # --------------------------------------------------------------------------
  # Create GitHub release on semver tags
  # --------------------------------------------------------------------------
  release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker images

            ```
            docker pull ${{ env.BACKEND_IMAGE }}:${{ needs.meta.outputs.version }}
            docker pull ${{ env.FRONTEND_IMAGE }}:${{ needs.meta.outputs.version }}
            ```
