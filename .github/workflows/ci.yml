name: CI

on:
  push:
    branches: [main, develop, "experiment/*"]
  pull_request:
    branches: [main, develop]
  workflow_call:

# Group runs per branch. cancel-in-progress is intentionally false: the experiment
# measures push -> conclusion wall-clock time, so a run must never be cancelled
# mid-measurement by a subsequent push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Least-privilege default for GITHUB_TOKEN; jobs widen only what they need.
permissions:
  contents: read

# ============================================================================
# Backend jobs
# ============================================================================

jobs:

  # --------------------------------------------------------------------------
  # Lint: ruff
  # --------------------------------------------------------------------------
  backend-lint:
    name: Backend · Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  # --------------------------------------------------------------------------
  # Tests: pytest (pure unit tests — no DB/Redis required)
  # --------------------------------------------------------------------------
  backend-test:
    name: Backend · Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    env:
      # Settings needed so get_settings() can validate without a .env file.
      # Tests themselves are pure functions and never hit DB/Redis.
      ENV: development
      DATABASE_USER: test_user
      DATABASE_PASSWORD: test_password
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_NAME: lingvopal_test
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      SECRET_KEY: ci-test-secret-key-minimum-32-chars-abc123
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      AI_API_KEY: dummy-key-for-ci
      IMAGE_SEARCH_API_KEY: dummy-key-for-ci
      TTS_ENABLED: "false"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

  # --------------------------------------------------------------------------
  # Migrations: verify alembic can run upgrade head against a real Postgres
  # --------------------------------------------------------------------------
  backend-migrations:
    name: Backend · Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: migrate_user
          POSTGRES_PASSWORD: migrate_pass
          POSTGRES_DB: lingvopal_migrate
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      ENV: development
      DATABASE_USER: migrate_user
      DATABASE_PASSWORD: migrate_pass
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_NAME: lingvopal_migrate
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      SECRET_KEY: ci-migration-secret-key-minimum-32-chars-xyz
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      AI_API_KEY: dummy-key-for-ci
      IMAGE_SEARCH_API_KEY: dummy-key-for-ci
      TTS_ENABLED: "false"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Verify no pending autogenerate changes
        # Fails if model changes exist that aren't captured in a migration
        run: uv run alembic check

  # --------------------------------------------------------------------------
  # Docker build + image vulnerability scan (Trivy)
  # --------------------------------------------------------------------------
  backend-docker:
    name: Backend · Docker build & scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write # upload Trivy SARIF to code scanning

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build backend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./backend
          push: false
          load: true # load into local docker so Trivy can scan it
          tags: lingvopal-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: lingvopal-backend:ci
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          # Required: without this, format=sarif scans ALL severities and the
          # severity filter above is ignored, so exit-code fires on any finding.
          limit-severities-for-sarif: true
          exit-code: "1" # fail the job on CRITICAL/HIGH findings
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always() # upload even when the scan step fails the build
        uses: github/codeql-action/upload-sarif@fee9466b8957867761f2d78f922ab084e3e2dd17 # v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

  # --------------------------------------------------------------------------
  # SAST: bandit (mirrors the pre-commit hook, enforced server-side)
  # --------------------------------------------------------------------------
  backend-security:
    name: Backend · SAST (bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3
        with:
          enable-cache: true

      - name: Bandit
        run: uvx 'bandit[toml]==1.9.4' -c pyproject.toml -r app -l

  # --------------------------------------------------------------------------
  # Dependency CVE audit: fail on known advisories in the locked deps
  # --------------------------------------------------------------------------
  backend-audit:
    name: Backend · Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@8d55fbecc275b1c35dbe060458839f8d30439ccf # v3
        with:
          enable-cache: true

      - name: Audit dependencies
        run: uv audit --no-dev

  # --------------------------------------------------------------------------
  # Secret scan: gitleaks (full history; server-side parity with the
  # detect-private-key / gitleaks pre-commit hooks — closes the --no-verify gap)
  # --------------------------------------------------------------------------
  secret-scan:
    name: Security · Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit, not just the tip

      - name: gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ============================================================================
# Frontend jobs
# ============================================================================

  # --------------------------------------------------------------------------
  # Lint + type-check + build
  # --------------------------------------------------------------------------
  frontend-lint-build:
    name: Frontend · Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Placeholder URL — just verifying the build succeeds
          VITE_API_URL: http://placeholder:8000/api/v1

  # --------------------------------------------------------------------------
  # Tests: vitest (with coverage)
  # --------------------------------------------------------------------------
  frontend-test:
    name: Frontend · Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: ignore

  # --------------------------------------------------------------------------
  # Dependency CVE audit (npm)
  # --------------------------------------------------------------------------
  frontend-audit:
    name: Frontend · Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit
        # --omit=dev: audit the runtime surface that ships in the browser bundle.
        # Dev-only tooling (e.g. the shadcn CLI) is not part of the deployed artifact.
        run: npm audit --audit-level=high --omit=dev

  # --------------------------------------------------------------------------
  # Docker build + image vulnerability scan (Trivy)
  # --------------------------------------------------------------------------
  frontend-docker:
    name: Frontend · Docker build & scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write # upload Trivy SARIF to code scanning

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build frontend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./frontend
          push: false
          load: true # load into local docker so Trivy can scan it
          tags: lingvopal-frontend:ci
          build-args: |
            VITE_API_URL=http://placeholder:8000/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: lingvopal-frontend:ci
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          # Required: without this, format=sarif scans ALL severities and the
          # severity filter above is ignored, so exit-code fires on any finding.
          limit-severities-for-sarif: true
          exit-code: "1" # fail the job on CRITICAL/HIGH findings
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always() # upload even when the scan step fails the build
        uses: github/codeql-action/upload-sarif@fee9466b8957867761f2d78f922ab084e3e2dd17 # v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

# ============================================================================
# Aggregate gate — single required status check for branch protection
# ============================================================================

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs:
      - backend-lint
      - backend-test
      - backend-migrations
      - backend-docker
      - backend-security
      - backend-audit
      - secret-scan
      - frontend-lint-build
      - frontend-test
      - frontend-audit
      - frontend-docker

    steps:
      - name: Verify all jobs succeeded
        # Fails if any needed job failed or was cancelled (skipped is allowed).
        run: |
          if echo '${{ join(needs.*.result, ' ') }}' | grep -qE 'failure|cancelled'; then
            echo "One or more CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All CI jobs passed."
