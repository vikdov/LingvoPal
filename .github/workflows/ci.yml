name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs on the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ============================================================================
# Backend jobs
# ============================================================================

jobs:

  # --------------------------------------------------------------------------
  # Lint: ruff
  # --------------------------------------------------------------------------
  backend-lint:
    name: Backend · Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --no-cache

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  # --------------------------------------------------------------------------
  # Tests: pytest (pure unit tests — no DB/Redis required)
  # --------------------------------------------------------------------------
  backend-test:
    name: Backend · Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      # Settings needed so get_settings() can validate without a .env file.
      # Tests themselves are pure functions and never hit DB/Redis.
      ENV: development
      DATABASE_USER: test_user
      DATABASE_PASSWORD: test_password
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_NAME: lingvopal_test
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      SECRET_KEY: ci-test-secret-key-minimum-32-chars-abc123
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      AI_API_KEY: dummy-key-for-ci
      IMAGE_SEARCH_API_KEY: dummy-key-for-ci
      TTS_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --no-cache

      - name: Run tests
        run: uv run pytest -v --tb=short

  # --------------------------------------------------------------------------
  # Migrations: verify alembic can run upgrade head against a real Postgres
  # --------------------------------------------------------------------------
  backend-migrations:
    name: Backend · Migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: migrate_user
          POSTGRES_PASSWORD: migrate_pass
          POSTGRES_DB: lingvopal_migrate
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      ENV: development
      DATABASE_USER: migrate_user
      DATABASE_PASSWORD: migrate_pass
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_NAME: lingvopal_migrate
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      SECRET_KEY: ci-migration-secret-key-minimum-32-chars-xyz
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      AI_API_KEY: dummy-key-for-ci
      IMAGE_SEARCH_API_KEY: dummy-key-for-ci
      TTS_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --no-cache

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Verify no pending autogenerate changes
        # Fails if model changes exist that aren't captured in a migration
        run: uv run alembic check

  # --------------------------------------------------------------------------
  # Docker build: verify backend image builds successfully
  # --------------------------------------------------------------------------
  backend-docker:
    name: Backend · Docker build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: lingvopal-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ============================================================================
# Frontend jobs
# ============================================================================

  # --------------------------------------------------------------------------
  # Lint + type-check + build
  # --------------------------------------------------------------------------
  frontend-lint-build:
    name: Frontend · Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Placeholder URL — just verifying the build succeeds
          VITE_API_URL: http://placeholder:8000/api/v1

  # --------------------------------------------------------------------------
  # Tests: vitest
  # --------------------------------------------------------------------------
  frontend-test:
    name: Frontend · Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

  # --------------------------------------------------------------------------
  # Docker build: verify frontend image builds successfully
  # --------------------------------------------------------------------------
  frontend-docker:
    name: Frontend · Docker build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: lingvopal-frontend:ci
          build-args: |
            VITE_API_URL=http://placeholder:8000/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max
