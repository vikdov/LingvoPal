server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for text assets
    gzip on;
    gzip_vary on;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # SPA routing — send all non-file requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed asset files (JS/CSS bundles, fonts) — cache forever
    location ~* \.(js|css|woff2|woff|ttf|ico|svg|png|jpg|jpeg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html — must not be cached so deploys propagate immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Lightweight health check endpoint for Docker/load-balancer probes
    location = /health {
        return 200 "ok";
        add_header Content-Type text/plain;
        access_log off;
    }
}
